<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mobile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Protest+Guerrilla&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <title>Impressum - Double In</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .mobile-content {
            flex: 1;
        }

        /* Impressum-Karte */
        .impressum-card {
            background-color: #0e202f;
            border-radius: 12px;
            border: 1px solid rgba(0, 150, 255, 0.2);
            padding: 20px;
            margin-bottom: 16px;
        }
        .impressum-card-label {
            color: rgba(255, 255, 255, 0.45);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 10px;
        }
        .impressum-card p {
            margin: 0;
            font-size: 1rem;
            line-height: 1.9;
            color: white;
        }

        /* Kontakt-Buttons */
        .contact-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #0e202f;
            border-radius: 12px;
            border: 1px solid rgba(0, 150, 255, 0.2);
            padding: 16px 20px;
            margin-bottom: 12px;
            text-decoration: none;
            transition: border-color 0.2s ease;
        }
        .contact-btn:active {
            border-color: rgba(0, 150, 255, 0.6);
        }
        .contact-btn-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .contact-btn-label {
            color: rgba(255, 255, 255, 0.5);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 2px;
        }
        .contact-btn-value {
            color: rgba(131, 131, 255, 1);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1rem;
            font-weight: 600;
            display: block;
        }
    </style>
</head>
<body>

<header class="mobile-header">
    <img src="images/logo.png" alt="Logo" class="mobile-header-logo" />
    <span class="mobile-header-title">Double In</span>
    <div class="burger" onclick="toggleMobileMenu()">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>
</header>

<div class="mobile-menu" id="mobileMenu">
    <a href="index-mobile.html">Home</a>
    <a href="Getraenkekarte-mobile.html">Getränkekarte</a>
    <a href="Infos-mobile.html">Informationen</a>
    <a href="Oeffnungszeiten-mobile.html">Öffnungszeiten</a>
    <a href="Impressum-mobile.html">Impressum</a>
</div>

<div class="mobile-content">
    <h2 class="mobile-page-title">Impressum</h2>

    <!-- Adress-Karte -->
    <div class="impressum-card">
        <p class="impressum-card-label">Anschrift</p>
        <p>
            Michael Friedrich<br>
            Double In<br>
            Horststraße 66<br>
            47137 Duisburg – Untermeiderich
        </p>
    </div>

    <!-- Telefon-Button -->
    <a href="tel:020336958666" class="contact-btn">
        <span class="contact-btn-icon">&#128222;</span>
        <span>
            <span class="contact-btn-label">Telefon</span>
            <span class="contact-btn-value">0203 36958666</span>
        </span>
    </a>

    <!-- E-Mail-Button -->
    <a href="mailto:double-in@gmx.de" class="contact-btn">
        <span class="contact-btn-icon">&#9993;</span>
        <span>
            <span class="contact-btn-label">E-Mail</span>
            <span class="contact-btn-value">double-in@gmx.de</span>
        </span>
    </a>
</div>

<footer class="mobile-footer">
    <a href="Impressum-mobile.html">Double In &copy; 2025</a>
    <a href="Impressum-mobile.html">Alle Rechte vorbehalten</a>
</footer>

<script src="scripts.js"></script>
</body>
</html>
